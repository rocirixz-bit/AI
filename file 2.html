<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenRouter Chatbot</title>
    <style>
        #chatbox { width: 400px; height: 500px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; }
        #input-area { margin-top: 10px; }
    </style>
</head>
<body>

<div id="chatbox"></div>
<div id="input-area">
    <input type="text" id="userInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const API_KEY = "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";
    const MODEL = "nvidia/nemotron-3-ultra-550b-a55b";

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatbox = document.getElementById("chatbox");
        const message = input.value;
        
        if (!message) return;

        chatbox.innerHTML += `<p><b>You:</b> ${message}</p>`;
        input.value = "";

        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${API_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: MODEL,
                messages: [{ role: "user", content: message }]
            })
        });

        const data = await response.json();
        const botReply = data.choices[0].message.content;
        chatbox.innerHTML += `<p><b>Bot:</b> ${botReply}</p>`;
        chatbox.scrollTop = chatbox.scrollHeight;
    }
</script>

</body>
</html>
